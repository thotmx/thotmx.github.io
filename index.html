<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thotmx · En construcción</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050916;
      --fg: #f5f5f5;
      --accent: #c0263a;
      --accent-bright: #e63946;
      --muted: #6b7089;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem 1rem;
      text-align: center;
      /* sutiles scanlines de arcade */
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.03) 0px,
        rgba(255, 255, 255, 0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      image-rendering: pixelated;
    }

    .sprite {
      width: 220px;
      max-width: 70vw;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* pedestal / sombra */
      filter: drop-shadow(0 0 24px rgba(230, 57, 70, 0.25));
    }

    h1 {
      font-size: clamp(0.9rem, 4vw, 1.6rem);
      line-height: 1.6;
      color: var(--accent-bright);
      text-shadow: 3px 3px 0 #000;
      animation: blink 1.2s steps(2, start) infinite;
    }

    /* acento pixelado dibujado sobre la O (la fuente arcade no trae Ó) */
    .o-acute { position: relative; }
    .o-acute::before {
      content: "";
      position: absolute;
      top: -0.30em;
      right: 0.14em;
      width: 0.17em;
      height: 0.17em;
      background: currentColor;
      transform: skewX(-24deg);
    }

    p.tag {
      font-size: clamp(0.5rem, 2.4vw, 0.75rem);
      color: var(--muted);
      line-height: 1.8;
    }

    .press {
      font-size: clamp(0.45rem, 2vw, 0.65rem);
      color: var(--fg);
      opacity: 0.85;
      animation: blink 1.6s steps(2, start) infinite;
    }

    footer {
      position: fixed;
      bottom: 1rem;
      font-size: clamp(0.4rem, 1.8vw, 0.55rem);
      color: var(--muted);
    }

    footer a { color: var(--accent-bright); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.25; }
    }

    @media (prefers-reduced-motion: reduce) {
      h1, .press { animation: none; }
    }
  </style>
</head>
<body>
  <img class="sprite" src="making-site.gif" alt="Personaje picando un cristal, construyendo el sitio">

  <h1>EN CONSTRUCCI<span class="o-acute">O</span>N</h1>

  <p class="tag">
    Le estoy dando forma a este sitio,<br>
    vuelve pronto.
  </p>

  <p class="press">&gt; INSERT COIN</p>

  <footer>
    Hermes Ojeda Ruiz &middot; Ruby dev &middot;
    <a href="https://github.com/thotmx" target="_blank" rel="noopener">github.com/thotmx</a>
  </footer>
</body>
</html>
